name: Release on custom/main merge

on:
  push:
    branches:
      - custom/main
    paths-ignore:
      - ".github/workflows/upstream-release-sync.yml"
      - ".github/workflows/release-on-custom-merge.yml"
      - "docs/fork-maintenance.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish a fork release instead of a dry-run artifact
        required: false
        default: false
        type: boolean
      upstream_tag:
        description: Optional upstream base tag override, for example v0.63.2
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-on-custom-main
  cancel-in-progress: false

env:
  UPSTREAM_REPO: manaflow-ai/cmux
  CUSTOM_BRANCH: custom/main
  CREATE_DMG_VERSION: 8.0.0

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      publish: ${{ steps.prepare.outputs.publish }}
      upstream_tag: ${{ steps.prepare.outputs.upstream_tag }}
      fork_tag: ${{ steps.prepare.outputs.fork_tag }}
      signed_release: ${{ steps.prepare.outputs.signed_release }}
      sparkle_available: ${{ steps.prepare.outputs.sparkle_available }}
      skip_build: ${{ steps.prepare.outputs.skip_build }}
    env:
      GH_TOKEN: ${{ github.token }}
      INPUT_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' && 'true' || 'false' }}
      INPUT_UPSTREAM_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upstream_tag || '' }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_RELEASE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_RELEASE_PROVISIONING_PROFILE_BASE64 }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: prepare
        run: |
          set -euo pipefail
          git fetch --tags origin

          PUBLISH=false
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            PUBLISH=true
          fi
          if [ "${INPUT_PUBLISH}" = "true" ]; then
            PUBLISH=true
          fi

          if [ -n "${INPUT_UPSTREAM_TAG}" ]; then
            UPSTREAM_TAG="${INPUT_UPSTREAM_TAG}"
          else
            UPSTREAM_TAG="$(git tag --list 'v*' | grep -Ev -- '-fork\.[0-9]+$' | sort -V | tail -1 || true)"
            if [ -z "${UPSTREAM_TAG}" ]; then
              UPSTREAM_TAG="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.tag_name')"
            fi
          fi
          if [ -z "${UPSTREAM_TAG}" ]; then
            echo "Unable to resolve upstream base tag" >&2
            exit 1
          fi

          EXISTING_TAG="$(git tag --points-at "${GITHUB_SHA}" | grep -E '^v[0-9].*-fork\.[0-9]+$' | sort -V | tail -1 || true)"
          if [ -n "${EXISTING_TAG}" ]; then
            FORK_TAG="${EXISTING_TAG}"
          else
            LAST_SUFFIX="$(git tag --list "${UPSTREAM_TAG}-fork.*" | awk -F'.fork.' 'NF == 2 { print $2 }' | sort -n | tail -1)"
            if [ -z "${LAST_SUFFIX}" ]; then
              LAST_SUFFIX=0
            fi
            NEXT_SUFFIX=$((LAST_SUFFIX + 1))
            FORK_TAG="${UPSTREAM_TAG}-fork.${NEXT_SUFFIX}"
          fi

          SPARKLE_AVAILABLE=false
          if [ -n "${SPARKLE_PRIVATE_KEY}" ]; then
            SPARKLE_AVAILABLE=true
          fi

          SIGNED_RELEASE=false
          if [ -n "${APPLE_CERTIFICATE_BASE64}" ] && \
             [ -n "${APPLE_CERTIFICATE_PASSWORD}" ] && \
             [ -n "${APPLE_RELEASE_PROVISIONING_PROFILE_BASE64}" ] && \
             [ -n "${APPLE_SIGNING_IDENTITY}" ] && \
             [ -n "${APPLE_ID}" ] && \
             [ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ] && \
             [ -n "${APPLE_TEAM_ID}" ]; then
            SIGNED_RELEASE=true
          fi

          SKIP_BUILD=false
          if [ "${PUBLISH}" = "true" ]; then
            mapfile -t EXISTING_ASSETS < <(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${FORK_TAG}" --jq '.assets[].name' 2>/dev/null || true)
            if [ "${#EXISTING_ASSETS[@]}" -gt 0 ]; then
              EXPECTED_ASSETS=(
                cmux-macos.dmg
                cmuxd-remote-darwin-arm64
                cmuxd-remote-darwin-amd64
                cmuxd-remote-linux-arm64
                cmuxd-remote-linux-amd64
                cmuxd-remote-checksums.txt
                cmuxd-remote-manifest.json
              )
              if [ "${SPARKLE_AVAILABLE}" = "true" ]; then
                EXPECTED_ASSETS+=(appcast.xml)
              fi

              MATCHED_COUNT=0
              for asset in "${EXPECTED_ASSETS[@]}"; do
                for existing in "${EXISTING_ASSETS[@]}"; do
                  if [ "${asset}" = "${existing}" ]; then
                    MATCHED_COUNT=$((MATCHED_COUNT + 1))
                    break
                  fi
                done
              done

              if [ "${MATCHED_COUNT}" -gt 0 ] && [ "${MATCHED_COUNT}" -lt "${#EXPECTED_ASSETS[@]}" ]; then
                echo "Release ${FORK_TAG} already has a partial immutable asset set" >&2
                exit 1
              fi
              if [ "${MATCHED_COUNT}" -eq "${#EXPECTED_ASSETS[@]}" ]; then
                SKIP_BUILD=true
              fi
            fi
          fi

          echo "publish=${PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          echo "fork_tag=${FORK_TAG}" >> "$GITHUB_OUTPUT"
          echo "signed_release=${SIGNED_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "sparkle_available=${SPARKLE_AVAILABLE}" >> "$GITHUB_OUTPUT"
          echo "skip_build=${SKIP_BUILD}" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: prepare
    if: needs.prepare.outputs.skip_build != 'true'
    runs-on: macos-15
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      PUBLISH: ${{ needs.prepare.outputs.publish }}
      UPSTREAM_TAG: ${{ needs.prepare.outputs.upstream_tag }}
      FORK_TAG: ${{ needs.prepare.outputs.fork_tag }}
      SIGNED_RELEASE: ${{ needs.prepare.outputs.signed_release }}
      SPARKLE_AVAILABLE: ${{ needs.prepare.outputs.sparkle_available }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_RELEASE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_RELEASE_PROVISIONING_PROFILE_BASE64 }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -z "${XCODE_APP}" ]; then
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
            XCODE_DIR="${XCODE_APP}/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=${XCODE_DIR}" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="${XCODE_DIR}"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Install build dependencies
        run: |
          set -euo pipefail
          ZIG_REQUIRED="0.15.2"
          if command -v zig >/dev/null 2>&1 && zig version 2>/dev/null | grep -q "^${ZIG_REQUIRED}"; then
            echo "zig ${ZIG_REQUIRED} already installed"
          else
            curl -fSL "https://ziglang.org/download/${ZIG_REQUIRED}/zig-aarch64-macos-${ZIG_REQUIRED}.tar.xz" -o /tmp/zig.tar.xz
            tar xf /tmp/zig.tar.xz -C /tmp
            sudo mkdir -p /usr/local/bin /usr/local/lib
            sudo cp -f /tmp/zig-aarch64-macos-${ZIG_REQUIRED}/zig /usr/local/bin/zig
            sudo cp -rf /tmp/zig-aarch64-macos-${ZIG_REQUIRED}/lib /usr/local/lib/zig
          fi
          npm install --global "create-dmg@${CREATE_DMG_VERSION}"

      - name: Download pre-built GhosttyKit.xcframework
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Cache Swift packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: .spm-cache
          key: spm-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: daemon/remote/go.mod

      - name: Compute fork Sparkle build number
        id: build_version
        run: |
          set -euo pipefail
          BASE_BUILD_NUMBER="$(grep -m1 'CURRENT_PROJECT_VERSION = ' GhosttyTabs.xcodeproj/project.pbxproj | sed 's/.*= //;s/;.*//')"
          FORK_SUFFIX="${FORK_TAG##*-fork.}"
          if ! [[ "${BASE_BUILD_NUMBER}" =~ ^[0-9]+$ && "${FORK_SUFFIX}" =~ ^[0-9]+$ ]]; then
            echo "Unable to compute fork Sparkle build number" >&2
            exit 1
          fi
          FORK_BUILD_NUMBER="$(printf '%s%03d' "${BASE_BUILD_NUMBER}" "${FORK_SUFFIX}")"
          echo "fork_build_number=${FORK_BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Derive Sparkle public key
        if: env.SPARKLE_AVAILABLE == 'true'
        run: |
          set -euo pipefail
          DERIVED_PUBLIC_KEY="$(swift scripts/derive_sparkle_public_key.swift "${SPARKLE_PRIVATE_KEY}")"
          echo "SPARKLE_PUBLIC_KEY=${DERIVED_PUBLIC_KEY}" >> "$GITHUB_ENV"

      - name: Build universal app
        run: |
          set -euo pipefail
          xcodebuild -scheme cmux -configuration Release -derivedDataPath build-universal \
            -destination 'generic/platform=macOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CURRENT_PROJECT_VERSION="${{ steps.build_version.outputs.fork_build_number }}" \
            CODE_SIGNING_ALLOWED=NO build

      - name: Verify binary architectures
        run: |
          set -euo pipefail
          APP_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/MacOS/cmux"
          CLI_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/cmux"
          HELPER_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/ghostty"
          APP_ARCHS="$(lipo -archs "${APP_BINARY}")"
          CLI_ARCHS="$(lipo -archs "${CLI_BINARY}")"
          HELPER_ARCHS="$(lipo -archs "${HELPER_BINARY}")"
          echo "App binary architectures: ${APP_ARCHS}"
          echo "CLI binary architectures: ${CLI_ARCHS}"
          echo "Ghostty helper architectures: ${HELPER_ARCHS}"
          [[ "${APP_ARCHS}" == *arm64* && "${APP_ARCHS}" == *x86_64* ]]
          [[ "${CLI_ARCHS}" == *arm64* && "${CLI_ARCHS}" == *x86_64* ]]
          [[ "${HELPER_ARCHS}" == *arm64* && "${HELPER_ARCHS}" == *x86_64* ]]

      - name: Build remote daemon release assets
        run: |
          set -euo pipefail
          APP_PLIST="build-universal/Build/Products/Release/cmux.app/Contents/Info.plist"
          APP_VERSION="$(
            /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "${APP_PLIST}"
          )"
          ./scripts/build_remote_daemon_release_assets.sh \
            --version "${APP_VERSION}" \
            --release-tag "${FORK_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --output-dir "remote-daemon-assets"

          MANIFEST_JSON="$(
            python3 -c 'import json,sys; print(json.dumps(json.load(open(sys.argv[1], encoding="utf-8")), separators=(",",":")))' remote-daemon-assets/cmuxd-remote-manifest.json
          )"
          plutil -remove CMUXRemoteDaemonManifestJSON "${APP_PLIST}" >/dev/null 2>&1 || true
          plutil -insert CMUXRemoteDaemonManifestJSON -string "${MANIFEST_JSON}" "${APP_PLIST}"

      - name: Run CLI version memory guard regression
        run: |
          set -euo pipefail
          CLI_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/cmux"
          [ -x "${CLI_BINARY}" ] || { echo "cmux CLI binary not found at ${CLI_BINARY}" >&2; exit 1; }
          CMUX_CLI_BIN="${CLI_BINARY}" python3 tests/test_cli_version_memory_guard.py

      - name: Verify bundled Ghostty theme picker helper
        run: |
          set -euo pipefail
          HELPER_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/ghostty"
          [ -x "${HELPER_BINARY}" ] || { echo "Ghostty theme picker helper not found at ${HELPER_BINARY}" >&2; exit 1; }

      - name: Inject Sparkle metadata into Info.plist
        if: env.SPARKLE_AVAILABLE == 'true'
        run: |
          set -euo pipefail
          APP_PLIST="build-universal/Build/Products/Release/cmux.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "${APP_PLIST}" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Delete :SUFeedURL" "${APP_PLIST}" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :SUPublicEDKey string ${SPARKLE_PUBLIC_KEY}" "${APP_PLIST}"
          /usr/libexec/PlistBuddy -c "Add :SUFeedURL string https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml" "${APP_PLIST}"

      - name: Import signing certificate
        if: env.SIGNED_RELEASE == 'true'
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "${APPLE_CERTIFICATE_BASE64}" | base64 --decode > /tmp/cert.p12
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" build.keychain
          security list-keychains -d user -s build.keychain
          echo "BUILD_KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "$GITHUB_ENV"

      - name: Embed release provisioning profile
        if: env.SIGNED_RELEASE == 'true'
        run: |
          set -euo pipefail
          APP_PATH="build-universal/Build/Products/Release/cmux.app"
          PROFILE_PATH="${APP_PATH}/Contents/embedded.provisionprofile"
          TMP_PROFILE="$(mktemp /tmp/cmux-release-profile.XXXXXX)"
          trap 'rm -f "${TMP_PROFILE}"' EXIT
          echo "${APPLE_RELEASE_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${TMP_PROFILE}"
          cp "${TMP_PROFILE}" "${PROFILE_PATH}"

      - name: Codesign app bundle
        if: env.SIGNED_RELEASE == 'true'
        run: |
          set -euo pipefail
          APP_PATH="build-universal/Build/Products/Release/cmux.app"
          ./scripts/sign-cmux-bundle.sh \
            "${APP_PATH}" \
            cmux.release.entitlements \
            "${APPLE_SIGNING_IDENTITY}"

      - name: Create notarized DMG
        if: env.SIGNED_RELEASE == 'true'
        run: |
          set -euo pipefail
          APP_PATH="build-universal/Build/Products/Release/cmux.app"
          ZIP_SUBMIT="cmux-notary.zip"
          DMG_RELEASE="cmux-macos.dmg"

          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_SUBMIT}"
          APP_SUBMIT_JSON="$(xcrun notarytool submit "${ZIP_SUBMIT}" --apple-id "${APPLE_ID}" --team-id "${APPLE_TEAM_ID}" --password "${APPLE_APP_SPECIFIC_PASSWORD}" --wait --output-format json)"
          APP_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"${APP_SUBMIT_JSON}")"
          APP_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"${APP_SUBMIT_JSON}")"
          if [ "${APP_STATUS}" != "Accepted" ]; then
            xcrun notarytool log "${APP_SUBMIT_ID}" --apple-id "${APPLE_ID}" --team-id "${APPLE_TEAM_ID}" --password "${APPLE_APP_SPECIFIC_PASSWORD}" || true
            echo "App notarization failed with status ${APP_STATUS}" >&2
            exit 1
          fi
          xcrun stapler staple "${APP_PATH}"
          xcrun stapler validate "${APP_PATH}"
          spctl -a -vv --type execute "${APP_PATH}"
          rm -f "${ZIP_SUBMIT}"

          create-dmg \
            --identity="${APPLE_SIGNING_IDENTITY}" \
            "${APP_PATH}" \
            ./
          mv ./cmux*.dmg "${DMG_RELEASE}"

          DMG_SUBMIT_JSON="$(xcrun notarytool submit "${DMG_RELEASE}" --apple-id "${APPLE_ID}" --team-id "${APPLE_TEAM_ID}" --password "${APPLE_APP_SPECIFIC_PASSWORD}" --wait --output-format json)"
          DMG_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"${DMG_SUBMIT_JSON}")"
          DMG_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"${DMG_SUBMIT_JSON}")"
          if [ "${DMG_STATUS}" != "Accepted" ]; then
            xcrun notarytool log "${DMG_SUBMIT_ID}" --apple-id "${APPLE_ID}" --team-id "${APPLE_TEAM_ID}" --password "${APPLE_APP_SPECIFIC_PASSWORD}" || true
            echo "DMG notarization failed with status ${DMG_STATUS}" >&2
            exit 1
          fi
          xcrun stapler staple "${DMG_RELEASE}"
          xcrun stapler validate "${DMG_RELEASE}"

      - name: Create unsigned DMG fallback
        if: env.SIGNED_RELEASE != 'true'
        run: |
          set -euo pipefail
          APP_PATH="build-universal/Build/Products/Release/cmux.app"
          STAGING_DIR="$(mktemp -d /tmp/cmux-dmg.XXXXXX)"
          trap 'rm -rf "${STAGING_DIR}"' EXIT
          cp -R "${APP_PATH}" "${STAGING_DIR}/cmux.app"
          ln -s /Applications "${STAGING_DIR}/Applications"
          hdiutil create -volname "cmux" -srcfolder "${STAGING_DIR}" -ov -format UDZO cmux-macos.dmg

      - name: Generate Sparkle appcast
        if: env.SPARKLE_AVAILABLE == 'true'
        run: |
          set -euo pipefail
          ./scripts/sparkle_generate_appcast.sh cmux-macos.dmg "${FORK_TAG}" appcast.xml

      - name: Prepare asset list and release notes
        id: assets
        run: |
          set -euo pipefail
          PACKAGING_MODE="unsigned"
          if [ "${SIGNED_RELEASE}" = "true" ]; then
            PACKAGING_MODE="signed-and-notarized"
          fi

          SPARKLE_MODE="skipped"
          if [ "${SPARKLE_AVAILABLE}" = "true" ]; then
            SPARKLE_MODE="included"
          fi

          cat > release-notes.md <<EOF
          Fork release for \`${GITHUB_REPOSITORY}\`

          - Upstream base tag: \`${UPSTREAM_TAG}\`
          - Fork tag: \`${FORK_TAG}\`
          - Source branch: \`${GITHUB_REF_NAME}\`
          - Commit: \`${GITHUB_SHA}\`
          - Packaging: \`${PACKAGING_MODE}\`
          - Sparkle appcast: \`${SPARKLE_MODE}\`
          - Fork Sparkle build number: \`${{ steps.build_version.outputs.fork_build_number }}\`
          EOF

          FILES=(
            cmux-macos.dmg
            remote-daemon-assets/cmuxd-remote-darwin-arm64
            remote-daemon-assets/cmuxd-remote-darwin-amd64
            remote-daemon-assets/cmuxd-remote-linux-arm64
            remote-daemon-assets/cmuxd-remote-linux-amd64
            remote-daemon-assets/cmuxd-remote-checksums.txt
            remote-daemon-assets/cmuxd-remote-manifest.json
          )
          if [ "${SPARKLE_AVAILABLE}" = "true" ] && [ -f appcast.xml ]; then
            FILES+=(appcast.xml)
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload dry-run build artifact
        if: env.PUBLISH != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cmux-custom-main-dry-run
          path: ${{ steps.assets.outputs.files }}
          if-no-files-found: error

      - name: Publish fork release
        if: env.PUBLISH == 'true'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ env.FORK_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.FORK_TAG }}
          body_path: release-notes.md
          files: ${{ steps.assets.outputs.files }}
          overwrite_files: false

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          rm -f /tmp/cert.p12
